name: Trigger Pipeline
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Push Pipeline
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.AUT_TOKEN }}
          repository: RutikG/Automated
          event-type: repo-a-changed
          client-payload: |
           {
            "sha": "${{ github.sha }}",
            "repo": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}"
           }
